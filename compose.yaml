services:
  db:
    image: "mariadb"
    command: --init-file /data/application/init.sql
    volumes:
      - ./queue-db.sql:/data/application/init.sql
    environment:
      MYSQL_ROOT_PASSWORD: "${MARIADB_PASSWORD}"
    healthcheck:
      test: ["CMD", "mariadb", "-u", "root", "-p${MARIADB_PASSWORD}", "-e", "SELECT 1;"]
      interval: 2s
      timeout: 2s
      retries: 40
  worker:
    build:
      context: .
      dockerfile: WordStyleCheckService.Worker.Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ConnectionString: "Server=db;Database=wordstylecheck;Uid=root;Pwd=${MARIADB_PASSWORD};AllowUserVariables=true"
      S3AccessKeyId: "${S3_WORKER_KEY_ID}"
      S3SecretAccessKey: "${S3_WORKER_KEY_SECRET}"
      "S3Region": "${S3_REGION}"
      "S3EndpointUrl": "${S3_ENDPOINT}"
      "S3IngressBucket": "${S3_INGRESS_BUCKET}"
      "S3EgressBucket": "${S3_EGRESS_BUCKET}"
      "S3EgressBucketBaseUrl": "${S3_EGRESS_BUCKET_BASE_URL}"
    deploy:
      replicas: 3
    depends_on:
      db:
        condition: service_healthy
  foreman:
    build:
      context: .
      dockerfile: WordStyleCheckService.Foreman.Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    environment:
      ConnectionString: "Server=db;Database=wordstylecheck;Uid=root;Pwd=${MARIADB_PASSWORD};AllowUserVariables=true"
      "S3AccessKeyId": "${S3_FOREMAN_KEY_ID}"
      "S3SecretAccessKey": "${S3_FOREMAN_KEY_SECRET}"
      "S3Region": "${S3_REGION}"
      "S3EndpointUrl": "${S3_ENDPOINT}"
      "S3IngressBucket": "${S3_INGRESS_BUCKET}"
      "S3EgressBucket": "${S3_EGRESS_BUCKET}"
      "S3EgressBucketBaseUrl": "${S3_EGRESS_BUCKET_BASE_URL}"
    depends_on:
      db:
        condition: service_healthy