apiVersion: v1
kind: Service
metadata:
  name: {{ include "wordstylecheck.fullname" . }}-foreman
  labels:
    {{- include "wordstylecheck.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "wordstylecheck.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: foreman
