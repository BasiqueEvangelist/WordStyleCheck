apiVersion: k8s.mariadb.com/v1alpha1
kind: MariaDB
metadata:
  name: {{ include "wordstylecheck.fullname" . }}-db
  labels:
    {{- include "wordstylecheck.labels" . | nindent 4 }}
spec:
  rootPasswordSecretKeyRef:
    name: {{.Values.mariadbRootPassword.secretName}}
    key: {{.Values.mariadbRootPassword.secretKey}}
    generate: false
    
  port: 3306
  
  storage:
    size: 256Mi
    
  myCnf: |
    [mariadb]
    bind-address=*
    default_storage_engine=InnoDB
    binlog_format=row
    innodb_autoinc_lock_mode=2
    innodb_buffer_pool_size=1600M
    max_allowed_packet=256M
  
  